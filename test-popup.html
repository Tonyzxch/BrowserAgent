<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Popup</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 400px;
      height: 550px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 24px;
      font-family: Arial, sans-serif;
    }
    h1 {
      font-size: 20px;
      margin-bottom: 20px;
    }
    textarea {
      width: 100%;
      height: 100px;
      padding: 12px;
      border-radius: 8px;
      border: none;
      margin-bottom: 12px;
    }
    button {
      width: 100%;
      padding: 12px;
      background: white;
      color: #667eea;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>浏览器智能助手 TEST</h1>
  <textarea placeholder="输入任务..."></textarea>
  <button>开始执行</button>
  <div style="margin-top: 20px;">
    <p>示例任务：</p>
    <p style="margin-top: 10px;">• 在百度搜索人工智能</p>
    <p>• 在GitHub搜索React项目</p>
  </div>
</body>
</html>
